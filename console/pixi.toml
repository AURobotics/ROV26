[workspace]
authors = ["Youssef Samy <office.youssefkassem@gmail.com>"]
channels = ["https://prefix.dev/aurobotics","conda-forge"]
name = "console"
platforms = ["linux-64","win-64"]
version = "0.1.0"

[dependencies]
python = ">=3.11,<3.14"
pyside6 = ">=6.11.0,<7"
opencv = ">=4.13.0,<5"
ultralytics = ">=8.4.38,<9"
pytorch = ">=2.10.0,<3"
torchvision = ">=0.25.0,<0.26"


[pypi-dependencies]
annotated-types = ">=0.7.0, <0.8"
cv2-enumerate-cameras = ">=1.3.3, <2"
pygame-ce = ">=2.5.7, <3"
pyserial = ">=3.5, <4"
requests = ">=2.33.1, <3"
console = { path = ".", editable = true }
pyside6-stubs = ">=6.7.3.0, <7"
