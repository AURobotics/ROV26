[workspace]
authors = ["Youssef Samy <office.youssefkassem@gmail.com>"]
channels = ["conda-forge"]
name = "console"
platforms = ["linux-64","win-64"]
version = "0.1.0"

[tasks]
start = "console"

[dependencies]
ultralytics = ">=8.4.37,<9"
python = ">=3.12,<3.13"
opencv = ">=4.13.0,<5"
pyside6 = ">=6.10.2,<7"
gstreamer = ">=1.28.2,<2"
gst-plugins-base = ">=1.28.2,<2"
gst-plugins-good = ">=1.28.2,<2"
gst-plugins-ugly = ">=1.28.2,<2"
gst-plugins-bad = ">=1.28.2,<2"
gst-libav = ">=1.28.2,<2"


[pypi-dependencies]
annotated-types = ">=0.7.0, <0.8"
cv2-enumerate-cameras = ">=1.3.3, <2"
pygame-ce = ">=2.5.7, <3"
pyserial = ">=3.5, <4"
requests = ">=2.33.1, <3"
console = { path = ".", editable = true }
pyside6-stubs = ">=6.7.3.0, <7"
