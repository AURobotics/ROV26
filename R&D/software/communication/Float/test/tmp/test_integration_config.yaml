mqtt_broker:
  address: localhost
  port: 1883
topics:
- name: home/living_room/temperature
  type: custom
  description: Schema for topic 'home/living_room/temperature'
  value:
    name: NewMessage
    type: custom
    description: Schema for MQTT message 'NewMessage'
    value:
    - name: celsius
      type: float
      description: ''
      value: 22.0
    - name: timestamp
      type: integer
      description: ''
      value: 1772642563
- name: home/living_room/humidity
  type: custom
  description: Schema for topic 'home/living_room/humidity'
  value:
    name: NewMessage
    type: custom
    description: Schema for MQTT message 'NewMessage'
    value:
    - name: percent
      type: float
      description: ''
      value: 45.0
    - name: timestamp
      type: integer
      description: ''
      value: 1772642563
- name: home/devices/thermostat
  type: custom
  description: Schema for topic 'home/devices/thermostat'
  value:
    name: NewMessage
    type: custom
    description: Schema for MQTT message 'NewMessage'
    value:
    - name: target_temp
      type: float
      description: ''
      value: 21.0
    - name: mode
      type: string
      description: ''
      value: auto
    - name: is_on
      type: boolean
      description: ''
      value: true
