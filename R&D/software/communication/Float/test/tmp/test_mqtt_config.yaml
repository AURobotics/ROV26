mqtt_broker:
  address: localhost
  port: 1883
topics:
- name: sensors/temperature
  type: custom
  description: Schema for topic 'sensors/temperature'
  value:
    name: NewMessage
    type: custom
    description: Schema for MQTT message 'NewMessage'
    value:
    - name: value
      type: float
      description: ''
      value: 22.5
    - name: unit
      type: string
      description: ''
      value: celsius
- name: sensors/humidity
  type: custom
  description: Schema for topic 'sensors/humidity'
  value:
    name: NewMessage
    type: custom
    description: Schema for MQTT message 'NewMessage'
    value:
    - name: value
      type: float
      description: ''
      value: 45.0
    - name: unit
      type: string
      description: ''
      value: percent
