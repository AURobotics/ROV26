mqtt_broker_config:
  address: new_address
  port: 1884
all_topics_schema:
  devices/commands:
    name: devices/commands
    type: custom
    value:
      name: device_command
      value:
      - name: command
        type: string
        value: START
        description: Command type
        allowed_values:
        - START
        - STOP
        - PAUSE
        - RESET
      - name: device_id
        type: string
        value: device_001
        description: Target device ID
      - name: parameters
        type: json
        value: '{"speed": 100, "mode": "auto"}'
        description: Command parameters
      - name: timestamp
        type: string
        value: '2024-01-15T10:30:00Z'
        description: Command timestamp
      description: Message 'device_command' schema
    description: Topic 'devices/commands' schema
  sensors/temperature:
    name: sensors/temperature
    type: custom
    value:
      name: temperature_message
      value:
      - name: timestamp
        type: string
        value: '2024-01-15T10:30:00Z'
        description: Measurement timestamp
      - name: value
        type: float
        value: 24.8
        description: Temperature value
        min_value: -50.0
        max_value: 100.0
      - name: unit
        type: string
        value: "\xB0C"
        description: Temperature unit
        allowed_values:
        - "\xB0C"
        - "\xB0F"
        - K
      - name: sensor_id
        type: string
        value: sensor_001
        description: Sensor identifier
        pattern: ^sensor_[0-9]{3}$
      description: Message 'temperature_message' schema
    description: Topic 'sensors/temperature' schema
  sensors/humidity/room1:
    name: sensors/humidity/room1
    type: custom
    value:
      name: humidity_message
      value:
      - name: humidity
        type: float
        value: 65.2
        description: Humidity percentage
        min_value: 0.0
        max_value: 100.0
      - name: timestamp
        type: string
        value: '2024-01-15T11:00:00Z'
        description: Measurement time
      description: Message 'humidity_message' schema
    description: Topic 'sensors/humidity/room1' schema
