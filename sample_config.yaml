all_topics_schema:
  devices/commands:
    description: Device commands topic
    name: devices/commands
    type: custom
    value:
      description: Device command message format
      name: device_command
      type: custom
      value:
      - allowed_values:
        - START
        - STOP
        - PAUSE
        - RESET
        description: Command type
        name: command
        type: string
        value: START
      - description: Target device ID
        name: device_id
        type: string
        value: device_001
      - description: Command parameters
        name: parameters
        type: json
        value: '{"speed": 100, "mode": "auto"}'
      - description: Command timestamp
        name: timestamp
        type: string
        value: '2024-01-15T10:30:00Z'
  sensors/temperature:
    description: Temperature sensor topic
    name: sensors/temperature
    type: custom
    value:
      description: Temperature sensor message format
      name: temperature_message
      type: custom
      value:
      - description: Measurement timestamp
        name: timestamp
        type: string
        value: '2024-01-15T10:30:00Z'
      - description: Temperature value
        max_value: 100.0
        min_value: -50.0
        name: value
        type: float
        value: 22.5
      - allowed_values:
        - "\xB0C"
        - "\xB0F"
        - K
        description: Temperature unit
        name: unit
        type: string
        value: "\xB0C"
      - description: Sensor identifier
        name: sensor_id
        pattern: ^sensor_[0-9]{3}$
        type: string
        value: sensor_001
mqtt_broker_config:
  address: test.broker.com
  port: 1883
